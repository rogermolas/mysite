<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Budget Nest: Expense Tracker</title>

<style>
:root {
    --bg: #0f172a;
    --primary: #22c55e;
    --secondary: #16a34a;
    --text: #ffffff;
    --muted: #a1a1aa;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: var(--bg);
    color: var(--text);
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 40px 20px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 0;
}

.icon {
    width: 90px;
    height: 90px;
    border-radius: 20px;
    margin-bottom: 15px;
}

.title {
    font-size: 34px;
    font-weight: bold;
}

.subtitle {
    color: var(--muted);
    margin-top: 8px;
}

/* BUTTONS */
.buttons {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

.btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    color: white;
}

.btn-primary {
    background: var(--primary);
}

.btn-secondary {
    background: #111;
    border: 1px solid #333;
}

/* BADGES */
.badge {
    height: 40px;
}

/* ABOUT */
.section {
    margin-top: 50px;
}

.section h2 {
    margin-bottom: 10px;
}

/* SCREENSHOTS */
.screens {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.screens img {
    height: 420px;
    border-radius: 16px;
    flex-shrink: 0;
}

/* FOOTER */
footer {
    text-align: center;
    color: var(--muted);
    margin-top: 60px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <img id="appIcon" class="icon" src="icon.png" />

        <div class="title" id="appName">App Name</div>
        <div class="subtitle" id="appSubtitle">Simple tagline goes here</div>

        <div class="buttons">
            <a id="iosLink" class="btn btn-primary" href="#">
                🍏 App Store
            </a>

            <a id="androidLink" class="btn btn-secondary" href="#">
                🤖 Google Play
            </a>
        </div>
    </div>

    <!-- ABOUT -->
    <div class="section">
        <h2>About</h2>
        <p id="appAbout" style="color: var(--muted); line-height: 1.6;">
            About your app goes here...
        </p>
    </div>

    <!-- SCREENSHOTS -->
    <div class="section">
        <h2>Screenshots</h2>
        <div class="screens" id="screenshots"></div>
    </div>

    <footer>
        © 2026 Budget Nest: Expense Tracker
    </footer>

</div>

<script>
/* =========================
   DYNAMIC CONFIG
========================= */
const appConfig = {
    name: "BudgetNest",
    subtitle: "Smart Offline Budget Manager",
    about: `BudgetNest (BudNest)

Take control of your finances with BudgetNest (BudNest), a simple and reliable budgeting app designed to help you manage your money anytime, anywhere. With full offline support, your financial data stays on your device, giving you complete privacy while allowing you to track your budget without an internet connection.

Whether you're planning a vacation, managing monthly expenses, or sharing costs with friends and family, BudgetNest makes budgeting easy and organized.

## Features

• Offline Budget Management
Create and manage your budgets without an internet connection. Your data remains private and accessible wherever you are.

• Budget by Category
Organize your expenses with customizable categories such as Travel, Food, Bills, Transportation, Shopping, Entertainment, Education, Healthcare, and more.

• Spending Tracker
Monitor your spending in real time to see where your money is going and make informed financial decisions.

• Remaining Budget Overview
Instantly view your remaining budget for each category to help prevent overspending and stay on track.

• Multiple Currency Support
Manage budgets in different currencies, making BudgetNest perfect for travelers, expatriates, and users with international expenses.

• Clean and Simple Interface
Designed for speed and ease of use, allowing you to create budgets, record expenses, and monitor your finances with just a few taps.

BudgetNest is ideal for anyone who wants to:

• Track daily expenses
• Plan travel budgets
• Manage household finances
• Stay within monthly spending limits
• Build better budgeting habits

#NOTE:
•  Your financial data stays on your device.
•  BudgetNest does not store your budgets or expenses on external servers.
•  Deleting the app permanently removes your locally stored data.

Download BudgetNest today and take the first step toward smarter financial management.
`,
    icon: "assets/logo-180.png",
    iosLink: "https://apps.apple.com/app/id000000",
    androidLink: "https://play.google.com/store/apps/details?id=com.example",

    screenshots: [
        "assets/screen1.jpg",
        "assets/screen2.jpg",
        "assets/screen3.jpg",
        "assets/screen4.jpg",
        "assets/screen5.jpg",
        "assets/screen6.jpg"
    ],

    theme: {
        bg: "#1A5140",
        primary: "#5CA87C",
        secondary: "#B7E5BA"
    }
};

/* =========================
   APPLY CONFIG
========================= */
document.getElementById("appName").innerText = appConfig.name;
document.getElementById("appSubtitle").innerText = appConfig.subtitle;
document.getElementById("appAbout").innerText = appConfig.about;

document.getElementById("appIcon").src = appConfig.icon;
document.getElementById("iosLink").href = appConfig.iosLink;
document.getElementById("androidLink").href = appConfig.androidLink;

/* screenshots */
const ssContainer = document.getElementById("screenshots");
appConfig.screenshots.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    ssContainer.appendChild(img);
});

// /* theme */
document.documentElement.style.setProperty("--bg", appConfig.theme.bg);
document.documentElement.style.setProperty("--primary", appConfig.theme.primary);
document.documentElement.style.setProperty("--secondary", appConfig.theme.secondary);
</script>

</body>
</html>
