<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Nest: Expense Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --primary: #22c55e;
            --secondary: #16a34a;
            --text: #ffffff;
            --muted: #a1a1aa;
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        a {
            color: var(--primary);
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 40px 0;
        }

        .icon {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 34px;
            font-weight: bold;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 8px;
        }

        /* BUTTONS */
        .buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .store-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
        }

        .btn-secondary {
            background: #111;
            border: 1px solid #333;
        }

        /* BADGES */
        .badge {
            height: 40px;
        }

        /* ABOUT */
        .section {
            margin-top: 50px;
        }

        .section h2 {
            margin-bottom: 10px;
        }

        /* SCREENSHOTS */
        .screens {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .screens img {
            height: 420px;
            border-radius: 16px;
            flex-shrink: 0;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 80px;
            padding: 30px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #a1a1aa;
            font-size: 13px;
            backdrop-filter: blur(10px);
        }

        /* Main text */
        .footer p {
            margin: 6px 0;
            line-height: 1.6;
        }

        /* Brand link */
        .footer a {
            color: #e5e7eb;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .footer a:hover {
            color: #ffffff;
        }

        /* Link row */
        .footer-links {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        /* Divider style links */
        .footer-links a {
            color: #9ca3af;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .footer-links a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: translateY(-1px);
        }

        /* Heart animation */
        .footer .heart {
            color: #ef4444;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HERO -->
        <div class="hero">
            <img id="appIcon" class="icon" src="icon.png" />

            <div class="title" id="appName">App Name</div>
            <div class="subtitle" id="appSubtitle">Simple tagline goes here</div>

            <div class="buttons">

                <a id="iosLink" href="https://apps.apple.com/us/app/budget-nest-expense-tracker/id6780990919">
                    <img src="https://www.rogermolas.com/static/store-badge/apps-store-black.svg" style="height: 44px;">
                </a>

                <a id="androidLink" href="#">
                    <img src="https://www.rogermolas.com/static/store-badge/google-play.svg" style="height: 44px;">
                </a>

            </div>
        </div>

        <!-- ABOUT -->
        <div class="section">
            <h2>About</h2>
            <p id="appAbout" style="color: var(--muted); line-height: 1.6;">
                About your app goes here...
            </p>
        </div>

        <!-- SCREENSHOTS -->
        <div class="section">
            <h2>Screenshots</h2>
            <div class="screens" id="screenshots"></div>
        </div>

        <footer class="footer">
            <p>Built with <span class="heart">❤️</span> by <strong>
                    <a href="https://www.rogermolas.com/" target="_blank">
                        Roger Molas
                    </a>
                </strong>
            </p>
            <p>
                © <span id="year"></span>
                <a href="https://www.brisklabs.dev/" target="_blank">
                    Brisklabs.dev
                </a>
                . All rights reserved.
            </p>
            <div class="footer-links">
                <a href="../budgetnest/budgetnest_app_privacy_policy.html">Privacy Policy</a>
                <a href="../budgetnest/budgetnest_app_terms_condition.html">Terms</a>
                <a href="mailto:contact@brisklabs.dev">Contact</a>
            </div>

        </footer>

        <script>
            document.getElementById("year").textContent = new Date().getFullYear();
        </script>

    </div>

    <script>
        /* =========================
           DYNAMIC CONFIG
        ========================= */
        const appConfig = {
            name: "BudgetNest",
            subtitle: "Smart Budget & Expense Tracker",
            about: `BudgetNest (BudNest) is a personal finance and budgeting app designed to help you take control of your money with a simple, private, and reliable budgeting experience.

Many people struggle to keep track of their spending, stay within budget, or manage expenses while traveling or without a reliable internet connection. 

BudgetNest solves these challenges by providing an easy way to create budgets, organize expenses by category, monitor remaining balances, and track spending entirely offline.

Whether you're managing monthly expenses, planning a trip, or tracking shared costs, BudgetNest makes it easy to organize your finances anytime, anywhere.

All budgeting features work completely offline, so you can create budgets, record expenses, and monitor your spending without an internet connection. Your financial data remains stored only on your device, giving you greater privacy and control.

Features

• Offline Budget Management
Create and manage budgets without an internet connection.

• Budget by Category
Organize expenses using customizable categories such as Food, Bills, Transportation, Shopping, Entertainment, Travel, Education, Healthcare, and more.

• Spending Tracker
Track your expenses and monitor your spending in real time.

• Remaining Budget Overview
See how much you have left to spend in each budget category to help avoid overspending.

• Multiple Currency Support
Manage budgets in different currencies, making BudgetNest ideal for travelers and users with international expenses.

• Simple and Intuitive Interface
Quickly create budgets, add expenses, and review your financial progress with an easy-to-use design.

BudgetNest is ideal for:
• Tracking daily expenses
• Planning travel budgets
• Managing household finances
• Staying within monthly spending limits
• Building better budgeting habits

Privacy

• Your financial data stays on your device.
• BudgetNest does not upload or store your budgets or expenses on external servers.
• Deleting the app permanently removes all locally stored data.

Download BudgetNest today and start building better budgeting habits with a simple, private, and offline-first budgeting app.
`,
            icon: "assets/logo-180.png",
            iosLink: "#",
            androidLink: "#",

            screenshots: [
                "assets/screen1.jpg",
                "assets/screen2.jpg",
                "assets/screen3.jpg",
                "assets/screen4.jpg",
                "assets/screen5.jpg",
                "assets/screen6.jpg",
                "assets/screen7.jpg"
            ],

            theme: {
                bg: "#1A5140",
                primary: "#5CA87C",
                secondary: "#B7E5BA"
            }
        };

        /* =========================
           APPLY CONFIG
        ========================= */
        document.getElementById("appName").innerText = appConfig.name;
        document.getElementById("appSubtitle").innerText = appConfig.subtitle;
        document.getElementById("appAbout").innerText = appConfig.about;

        document.getElementById("appIcon").src = appConfig.icon;
        document.getElementById("iosLink").href = appConfig.iosLink;
        document.getElementById("androidLink").href = appConfig.androidLink;

        /* screenshots */
        const ssContainer = document.getElementById("screenshots");
        appConfig.screenshots.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            ssContainer.appendChild(img);
        });

        // /* theme */
        document.documentElement.style.setProperty("--bg", appConfig.theme.bg);
        document.documentElement.style.setProperty("--primary", appConfig.theme.primary);
        document.documentElement.style.setProperty("--secondary", appConfig.theme.secondary);

        // Copyrights
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

</body>

</html>
